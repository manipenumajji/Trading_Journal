<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdgeJournal – Pro Trading Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="app">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">

        <div class="sidebar-logo">
            <div class="logo-icon-wrap">📈</div>
            <div>
                <div class="logo-title">EdgeJournal</div>
                <span class="logo-badge">PRO</span>
            </div>
        </div>

        <nav class="sidebar-nav">

            <span class="nav-section-label">Overview</span>

            <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
                <span class="nav-icon">⊞</span> Dashboard
            </a>

            <a href="/trades" class="nav-link {% if request.path == '/trades' %}active{% endif %}">
                <span class="nav-icon">⇄</span> Trades
            </a>

            <a href="/analytics" class="nav-link {% if request.path == '/analytics' %}active{% endif %}">
                <span class="nav-icon">↗</span> Analytics
            </a>

            <span class="nav-section-label" style="margin-top:0.5rem;">Actions</span>

            <a href="/add_trade" class="nav-link {% if request.path == '/add_trade' %}active{% endif %}">
                <span class="nav-icon">＋</span> Add Trade
            </a>
            
            <a href="/settings" class="nav-link {% if request.path == '/settings' %}active{% endif %}">
                <span class="nav-icon">⚙</span> Settings
            </a>

        </nav>

        <div class="sidebar-footer">
            <div class="user-avatar">M</div>
            <div>
                <div class="user-name">Mani</div>
                <div class="user-role">Trader</div>
            </div>
            <div class="status-dot" title="Active session"></div>
        </div>

    </aside>

    <!-- ── Main ── -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

</div>

</body>
</html>
